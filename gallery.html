    <style>
        html { scrollbar-width: none; }
        body::-webkit-scrollbar { display: none; }
        body { overflow-x: hidden; }

        @property --rotate {
            syntax: "<number>";
            inherits: true;
            initial-value: 0;
        }

        .gallery-page-body {
            --cards: 16;
            height: calc(var(--cards) * 80svh);
            margin: 0;
            font-family: 'Bricolage Grotesque', 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text-primary);

            animation: --page-rotate 1s linear;
            animation-timeline: scroll(nearest block);
            animation-timing-function: steps(var(--cards));
        }

        .gallery-page-body .gallery-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-color: var(--bg-primary);
        }

        @keyframes --page-rotate {
            to { --rotate: 1; }
        }

        .gallery-page-body .wrapper {
            --card-border-radius: 14px;
            --cards: 16;
            --card-width: max(120px, min(250px, 18vw));
            --card-height: calc(var(--card-width) * 6 / 4);
            --radius: calc(var(--card-width) * var(--cards) / (2 * 3.1416));

            font-family: 'Just Me Again Down Here', handwriting;
            position: fixed;
            width: calc(var(--radius) * 2);
            height: calc(var(--radius) * 2);

            top: calc(50% + var(--card-height) / 2);
            left: 50%;
            transform-origin: center center;
            transform: translateX(-50%) rotate(calc(var(--rotate) * 360deg));
            transition: transform 300ms linear;
            opacity: 0;
            pointer-events: none;
        }

        .gallery-page-body .wrapper > div {
            --card-i: 1;

            --card-offset-radius: circle(var(--radius) at 50% 50%);
            --card-offset-distance: calc((var(--card-i) - 1) / var(--cards) * 100%);

            --card-phase: calc((var(--card-i) - 1) / var(--cards) - 0.75);
            --card-pos: mod(calc(var(--card-phase) + var(--rotate) + 1), 1);
            --card-dist: min(var(--card-pos), calc(1 - var(--card-pos)));

            --card-grayscale: clamp(0, calc(var(--card-dist) * var(--cards)), 1);
            --card-opacity: calc(1 - (var(--card-dist) / 0.15));

            --card-focus-range: .1;
            --card-max-blur: 7px;
            --card-norm-dist: min(var(--card-dist), var(--card-focus-range));
            --card-blur-progress: calc(var(--card-norm-dist) / var(--card-focus-range));
            --card-blur: calc(var(--card-blur-progress) * var(--card-max-blur));

            --caption-active: clamp(0, 1 - (var(--card-dist) / 0.001), 1);
            --caption-opacity: var(--caption-active);
            --caption-y: calc(-150px * (1 - var(--caption-active)));

            filter: blur(var(--card-blur)) grayscale(var(--card-grayscale));
            opacity: var(--card-opacity);
            container: size;

            offset-path: var(--card-offset-radius);
            offset-distance: var(--card-offset-distance);
            offset-rotate: auto;
            offset-anchor: 50% 100%;

            position: absolute;
            width: var(--card-width);
            aspect-ratio: 4/6;
            object-fit: cover;
            border-radius: var(--card-border-radius);
            transition: all 300ms ease-in-out;
            transform-origin: center calc(var(--card-height) * 2 * -1);
        }

        .gallery-page-body .wrapper > div:nth-child(1) { --card-i: 1; }
        .gallery-page-body .wrapper > div:nth-child(2) { --card-i: 2; }
        .gallery-page-body .wrapper > div:nth-child(3) { --card-i: 3; }
        .gallery-page-body .wrapper > div:nth-child(4) { --card-i: 4; }
        .gallery-page-body .wrapper > div:nth-child(5) { --card-i: 5; }
        .gallery-page-body .wrapper > div:nth-child(6) { --card-i: 6; }
        .gallery-page-body .wrapper > div:nth-child(7) { --card-i: 7; }
        .gallery-page-body .wrapper > div:nth-child(8) { --card-i: 8; }
        .gallery-page-body .wrapper > div:nth-child(9) { --card-i: 9; }
        .gallery-page-body .wrapper > div:nth-child(10) { --card-i: 10; }
        .gallery-page-body .wrapper > div:nth-child(11) { --card-i: 11; }
        .gallery-page-body .wrapper > div:nth-child(12) { --card-i: 12; }
        .gallery-page-body .wrapper > div:nth-child(13) { --card-i: 13; }
        .gallery-page-body .wrapper > div:nth-child(14) { --card-i: 14; }
        .gallery-page-body .wrapper > div:nth-child(15) { --card-i: 15; }
        .gallery-page-body .wrapper > div:nth-child(16) { --card-i: 16; }

        .gallery-page-body .wrapper > div::after {
            content: attr(data-title);
            position: absolute;
            top: 100%;
            left: 1rem;
            opacity: var(--caption-opacity);
            translate: 0 var(--caption-y);
            font-size: clamp(1rem, 2vw + 0.045rem, 1.6rem);
            z-index: -1;
            transition: opacity 300ms ease-in-out, translate 300ms ease-in-out;
            white-space: nowrap;
        }

        .gallery-page-body .wrapper > div > img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: inherit;
        }

        .gallery-page-body .mouse {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            translate: -50% 0;
            width: 50px;
            height: 50px;
            opacity: 1;
            color: var(--text-primary);
            display: none;
            animation-name: mouse-fade;
            animation-duration: 1s;
            animation-timing-function: linear;
            animation-fill-mode: forwards;
            animation-timeline: scroll(nearest block);
            z-index: 1000;
        }

        @supports (animation-timeline: scroll()) {
            .gallery-page-body .wrapper { opacity: 1; pointer-events: auto; }
            .gallery-page-body .mouse { display: block; }
        }

        @keyframes mouse-fade {
            75% { opacity: 1; }
            100% { opacity: 0; }
        }

        @supports not (animation-timeline: scroll()) {
            .gallery-page-body::after {
                content: "Sorry, your browser doesn't support scroll-driven animations";
                position: fixed;
                top: 5rem;
                left: 50%;
                translate: -50% 0;
                font-size: 0.8rem;
                z-index: 100;
                background: var(--bg-primary);
                padding: 0.5rem 1rem;
                border-radius: 8px;
                text-align: center;
            }
        }

        @media (max-width: 1024px) {
            .gallery-page-body .wrapper {
                --card-width: max(100px, min(200px, 18vw));
            }
        }

        @media (max-width: 768px) {
            .gallery-page-body {
                height: calc(var(--cards) * 90svh);
            }
            .gallery-page-body .wrapper {
                --card-width: max(90px, min(180px, 20vw));
            }
            .gallery-page-body .wrapper > div::after {
                font-size: 0.8rem;
                left: 0.3rem;
            }
        }

        @media (max-width: 480px) {
            .gallery-page-body {
                height: calc(var(--cards) * 100svh);
            }
            .gallery-page-body .wrapper {
                --card-width: max(70px, min(140px, 26vw));
                --card-border-radius: 10px;
            }
            .gallery-page-body .wrapper > div::after {
                font-size: 0.7rem;
                left: 0.2rem;
            }
        }
    </style>

    <script>
      document.addEventListener('contextmenu', e => e.preventDefault());
      document.addEventListener('keydown', e => {
        if (e.key === 'F12' ||
            (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) ||
            (e.ctrlKey && e.key.toUpperCase() === 'U')) {
          e.preventDefault();
        }
      });
      const devtoolsCheck = () => {
        if (!document.body) return;
        const threshold = 160;
        const widthDiff = window.outerWidth - window.innerWidth;
        const heightDiff = window.outerHeight - window.innerHeight;
        if (widthDiff > threshold || heightDiff > threshold) {
          document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0f;color:#fff;font-family:sans-serif;text-align:center;padding:2rem;"><div><h1 style="color:#e74c3c;">Access Denied</h1><p>Developer tools are not allowed on this site.</p></div></div>';
        }
      };
      setInterval(devtoolsCheck, 1000);
    </script>
