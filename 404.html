<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" href="/fav.png" type="image/png">
    <title>404 Page Not Found – Razu Ahmed</title>

    <!-- Custom Redesigned Stylesheet -->
    <link rel="stylesheet" href="/css/portfolio.css" media="all">
    <script defer src="/fontawesome-5/all-5.15.4.js"></script>

    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: var(--space-4);
            text-align: center;
            background-image: 
                radial-gradient(circle at 10% 20%, var(--accent-glow) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, var(--accent-2-glow) 0%, transparent 40%);
        }
        .error-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: var(--space-6);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            max-width: 500px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-3);
        }
        .error-code {
            font-family: var(--font-display);
            font-size: 80px;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-2-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .error-title {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--text-primary);
        }
        .error-desc {
            font-size: var(--text-sm);
            color: var(--text-muted);
            line-height: 1.6;
        }
    </style>
</head>

<body class="dark">
    <div class="error-container">
        <div class="error-card">
            <a href="/" style="display: flex; align-items: center; gap: 8px; margin-bottom: var(--space-1);">
                <img src="/fav.png" alt="Razu Ahmed Logo" width="36" height="36">
            </a>
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-desc">
                Oops! The page you are looking for does not exist, has been removed, or is temporarily unavailable.
            </p>
            <a href="/" class="btn-primary" style="margin-top: var(--space-1);">
                Back to Home <i class="fas fa-home"></i>
            </a>
        </div>
    </div>

    <script>
        // Apply persisted theme on load
        const activeTheme = localStorage.getItem('pref-theme') || 'dark';
        if (activeTheme === 'light') {
            document.body.classList.remove('dark');
        } else {
            document.body.classList.add('dark');
        }
    </script>
</body>

</html>
